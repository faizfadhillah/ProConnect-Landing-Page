<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- All relative URLs (scripts, assets) resolve against this base, so the same
       index.html works when served from any slug directory (e.g. /pricing/). -->
  <base href="/proconnect-landing-page/" />
  <title>ProConnect: ASEAN Hospitality Hiring Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; background: #fff; }
    body { overflow-x: hidden; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #F8F9F9; }
    ::-webkit-scrollbar-thumb { background: #EAEBEB; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #B5B6B6; }

    /* Smooth page transitions */
    .page-enter { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { transform: translateY(8px); } to { transform: translateY(0); } }

    /* Hover underline for nav */
    a { transition: color 0.15s; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Load component files in order -->
  <script type="text/babel" src="shared.jsx"></script>
  <script type="text/babel" src="homepage.jsx"></script>
  <script type="text/babel" src="inner-pages.jsx"></script>
  <script type="text/babel" src="features.jsx"></script>
  <script type="text/babel" src="pricing.jsx"></script>
  <script type="text/babel" src="about.jsx"></script>
  <script type="text/babel" src="solution.jsx"></script>
  <script type="text/babel" src="jobs.jsx"></script>
  <script type="text/babel" src="login.jsx"></script>
  <script type="text/babel" src="legal.jsx"></script>
  <script type="text/babel" src="register-shared.jsx"></script>
  <script type="text/babel" src="register-employer.jsx"></script>
  <script type="text/babel" src="register-candidate1.jsx"></script>
  <script type="text/babel" src="register-candidate2.jsx"></script>
  <script type="text/babel" src="employer.jsx"></script>
  <script type="text/babel" src="subscription.jsx"></script>
  <script type="text/babel" src="dashboard-multirole.jsx"></script>
  <script type="text/babel" src="candidate-pages.jsx"></script>
  <script type="text/babel" src="candidate-jobs.jsx"></script>
  <script type="text/babel" src="candidate.jsx"></script>

  <!-- Main App -->
  <script type="text/babel">

    // ---- Routing config -------------------------------------------------
    // Base path the site is served from (the GitHub Pages project subpath).
    const BASE = '/proconnect-landing-page/';

    // Map each internal page key to a URL slug ('' = the site root).
    const PAGE_TO_SLUG = {
      home:                 '',
      features:             'features',
      pricing:              'pricing',
      about:                'about',
      solution:             'solution',
      jobs:                 'jobs',
      login:                'login',
      forgot:               'forgot-password',
      tos:                  'terms',
      privacy:              'privacy',
      contact:              'contact',
      'choose-role':        'register',
      'register-employer':  'register/employer',
      'register-candidate': 'register/candidate',
      employer:             'dashboard/employer',
      candidate:            'dashboard/candidate',
    };

    // Reverse map: slug -> page key.
    const SLUG_TO_PAGE = Object.keys(PAGE_TO_SLUG).reduce((m, p) => {
      m[PAGE_TO_SLUG[p]] = p; return m;
    }, {});

    // Per-page document titles (good for tabs, bookmarks, sharing, SEO).
    const PAGE_TITLES = {
      home:                 'ProConnect: ASEAN Hospitality Hiring Platform',
      features:             'Features — ProConnect',
      pricing:              'Pricing — ProConnect',
      about:                'About Us — ProConnect',
      solution:             'Solutions — ProConnect',
      jobs:                 'Browse Jobs — ProConnect',
      login:                'Log In — ProConnect',
      forgot:               'Reset Password — ProConnect',
      tos:                  'Terms of Service — ProConnect',
      privacy:              'Privacy Policy — ProConnect',
      contact:              'Contact Us — ProConnect',
      'choose-role':        'Create Account — ProConnect',
      'register-employer':  'Employer Sign Up — ProConnect',
      'register-candidate': 'Candidate Sign Up — ProConnect',
      employer:             'Employer Dashboard — ProConnect',
      candidate:            'Candidate Dashboard — ProConnect',
    };

    // Resolve the current page key from the browser's address bar.
    function pageFromLocation() {
      let path = window.location.pathname;
      if (path.indexOf(BASE) === 0) path = path.slice(BASE.length);
      path = path.replace(/^\/+|\/+$/g, ''); // trim leading/trailing slashes
      return SLUG_TO_PAGE.hasOwnProperty(path) ? SLUG_TO_PAGE[path] : 'home';
    }

    // Build the absolute URL for a page key.
    function urlForPage(p) {
      const slug = PAGE_TO_SLUG.hasOwnProperty(p) ? PAGE_TO_SLUG[p] : '';
      return BASE + (slug ? slug + '/' : '');
    }

    function setTitle(p) {
      document.title = PAGE_TITLES[p] || PAGE_TITLES.home;
    }

    function App() {
      const [page, setPage] = React.useState(pageFromLocation());

      // Sync state when the user uses the browser back/forward buttons.
      React.useEffect(() => {
        setTitle(pageFromLocation());
        const onPop = () => {
          const p = pageFromLocation();
          setPage(p);
          setTitle(p);
          window.scrollTo({ top: 0 });
        };
        window.addEventListener('popstate', onPop);
        return () => window.removeEventListener('popstate', onPop);
      }, []);

      const navigate = (p) => {
        const url = urlForPage(p);
        if (window.location.pathname !== url) {
          window.history.pushState({ page: p }, '', url);
        }
        setTitle(p);
        setPage(p);
        window.scrollTo({ top: 0 });
      };
      navigate.back = (fallback) => {
        // Prefer real browser history; fall back to a page key for deep links.
        if (window.history.length > 1) { window.history.back(); }
        else { navigate(fallback || 'home'); }
      };

      // Toast
      const [toast, setToast] = React.useState(null);

      const pageMap = {
        home:      <HomePage navigate={navigate} />,
        features:  <FeaturesPage navigate={navigate} />,
        pricing:   <PricingPage navigate={navigate} />,
        about:     <AboutPage navigate={navigate} />,
        solution:  <SolutionPage navigate={navigate} />,
        jobs:      <JobsPage navigate={navigate} />,
        login:     <LoginPage navigate={navigate} />,
        register:  <RegisterPage navigate={navigate} />,
        forgot:    <ForgotPasswordPage navigate={navigate} />,
        tos:       <TermsPage navigate={navigate} />,
        privacy:   <PrivacyPage navigate={navigate} />,
        contact:   <ContactPage navigate={navigate} />,
        'choose-role':      <ChooseRolePage navigate={navigate} />,
        'register-employer': <EmployerRegister navigate={navigate} />,
        'register-candidate': <CandidateRegister navigate={navigate} />,
        employer:  <MultiRoleDashboard navigate={navigate} />,
        candidate: <CandidateDashboard navigate={navigate} onHome={() => navigate('home')} />,
      };

      const isDash = page === 'employer' || page === 'candidate';

      return (
        <div>
          {/* Quick-nav tabs */}
          <div style={{
            position: 'fixed', bottom: 24, right: 24, zIndex: 9999,
            display: 'flex', flexDirection: 'column', gap: 6, alignItems: 'flex-end',
          }}>
            {/* Page section tabs */}
            <div style={{ display: 'flex', gap: 6 }}>
              {[
                { id: 'home',      label: '🏠 Home' },
                { id: 'choose-role', label: '📝 Register' },
                { id: 'employer',  label: '🏢 Employer' },
                { id: 'candidate', label: '👤 Candidate' },
              ].map(({ id, label }) => (
                <button key={id} onClick={() => navigate(id)} style={{
                  padding: '8px 14px', borderRadius: 20, border: 'none', cursor: 'pointer',
                  fontFamily: 'Montserrat', fontSize: 12, fontWeight: 700,
                  background: page === id ? '#1560BD' : 'rgba(4,38,72,0.82)',
                  color: '#fff', boxShadow: '0 4px 16px rgba(0,0,0,0.22)',
                  transition: 'all 0.18s',
                }}>{label}</button>
              ))}
            </div>
          </div>

          {/* Render current page */}
          <div key={page} className="page-enter">
            {pageMap[page] || pageMap['home']}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
